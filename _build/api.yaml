openapi: 3.1.0
info:
  description: Conekta sdk
  version: 2.3.0
  contact:
    name: Engineering Conekta
    url: https://github.com/conekta/openapi/issues
    email: engineering@conekta.com
  title: Conekta API
  license:
    name: MIT-LICENSE
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://api.conekta.io
    description: Conekta main server
security:
  - bearerAuth: []
tags:
  - name: Subscriptions
    description: All subscription-related endpoints including creation, management, and events
  - name: Subscriptions - Customer Portal
    description: Customer portal endpoints for subscriptions
paths:
  /antifraud/whitelists:
    get:
      tags:
        - Antifraud
      operationId: GetRuleWhitelist
      description: Return all rules
      summary: Get a list of whitelisted rules
      parameters:
        - $ref: '#/components/parameters/accept_language'
      responses:
        '200':
          description: All the rules
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                $ref: '#/components/schemas/risk_rules_list'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
    post:
      tags:
        - Antifraud
      operationId: CreateRuleWhitelist
      summary: Create whitelisted rule
      parameters:
        - $ref: '#/components/parameters/accept_language'
      responses:
        '200':
          description: successfully registered rule
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                title: whitelistlist_rule_response
                properties:
                  id:
                    type: string
                    example: 2fw8EWJusiRrxdPzT
                    description: Whitelist rule id
                  field:
                    type: string
                    example: email
                    description: field used for whitelists rule
                  value:
                    type: string
                    example: email@example.com
                    description: value used for whitelists rule
                  description:
                    type: string
                    example: banned customer example@example.com
                    description: use an description for whitelisted rule
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create_risk_rules_data'
  /antifraud/whitelists/{id}:
    delete:
      tags:
        - Antifraud
      operationId: DeleteRuleWhitelist
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/accept_language'
        - $ref: '#/components/parameters/x_child_company_id'
      summary: Delete whitelisted rule
      responses:
        '200':
          description: successfully deleted rule
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                title: deleted_whitelist_rule_response
                properties:
                  id:
                    type: string
                    example: 2fw8EWJusiRrxdPzT
                    description: Whitelist rule id
                  field:
                    type: string
                    example: email
                    description: field used for whitelists rule deleted
                  value:
                    type: string
                    example: email@example.com
                    description: value used for whitelists rule deleted
                  description:
                    type: string
                    example: secure customer example@example.com
                    description: use an description for whitelisted rule
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /antifraud/blacklists:
    get:
      tags:
        - Antifraud
      operationId: GetRuleBlacklist
      description: Return all rules
      summary: Get list of blacklisted rules
      parameters:
        - $ref: '#/components/parameters/accept_language'
      responses:
        '200':
          description: All the rules
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                $ref: '#/components/schemas/risk_rules_list'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
    post:
      tags:
        - Antifraud
      operationId: CreateRuleBlacklist
      summary: Create blacklisted rule
      parameters:
        - $ref: '#/components/parameters/accept_language'
      responses:
        '200':
          description: successfully registered rule
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                title: blacklist_rule_response
                properties:
                  id:
                    type: string
                    example: 2fw8EWJusiRrxdPzT
                    description: Blacklist rule id
                  field:
                    type: string
                    example: email
                    description: field used for blacklists rule
                  value:
                    type: string
                    example: email@example.com
                    description: value used for blacklists rule
                  description:
                    type: string
                    example: secure customer example@example.com
                    description: use an description for blacklisted rule
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
      requestBody:
        description: requested field for blacklist rule
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create_risk_rules_data'
        required: true
  /antifraud/blacklists/{id}:
    delete:
      summary: Delete blacklisted rule
      tags:
        - Antifraud
      operationId: DeleteRuleBlacklist
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/accept_language'
        - $ref: '#/components/parameters/x_child_company_id'
      responses:
        '200':
          description: successfully deleted rule
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                title: deleted_blacklist_rule_response
                properties:
                  id:
                    type: string
                    example: 2fw8EWJusiRrxdPzT
                    description: Blacklist rule id
                  field:
                    type: string
                    example: email
                    description: field used for blacklists rule deleted
                  value:
                    type: string
                    example: email@example.com
                    description: value used for blacklists rule deleted
                  description:
                    type: string
                    example: banned customer example@example.com
                    description: use an description for blacklisted rule
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /api_keys:
    get:
      tags:
        - Api Keys
      operationId: getApiKeys
      summary: Get list of Api Keys
      description: Consume the list of api keys you have
      responses:
        '200':
          description: successful
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                title: get_api_keys_response
                allOf:
                  - $ref: '#/components/schemas/page'
                  - $ref: '#/components/schemas/pagination'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/api_key_response'
          headers:
            Content-Type:
              description: The format of the response body
              schema:
                type: string
                example: application/json; charset=utf-8
            Conekta-Media-Type:
              schema:
                type: string
                example: conekta-v2.3.0; format=application/json
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/accept_language'
        - $ref: '#/components/parameters/x_child_company_id'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/next_page'
        - $ref: '#/components/parameters/previous_page'
        - description: General search, e.g. by id, description, prefix
          in: query
          name: search
          required: false
          schema:
            type: string
    post:
      tags:
        - Api Keys
      operationId: createApiKey
      summary: Create Api Key
      description: Create a api key
      responses:
        '200':
          description: successful operation
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                title: api_key_create_response
                allOf:
                  - type: object
                    properties:
                      authentication_token:
                        type: string
                        example: key_rpHzxufNgjFCdprEEFZRTKi
                        description: It is occupied as a user when authenticated with basic authentication, with a blank password. This value will only appear once, in the request to create a new key. Copy and save it in a safe place.
                  - $ref: '#/components/schemas/api_key_response'
          headers:
            Content-Type:
              description: The format of the response body
              schema:
                type: string
                example: application/json; charset=utf-8
            Conekta-Media-Type:
              schema:
                type: string
                example: conekta-v2.3.0; format=application/json
        '401':
          $ref: '#/components/responses/401'
        '422':
          $ref: '#/components/responses/422'
        '500':
          $ref: '#/components/responses/500'
      security:
        - bearerAuth: []
      requestBody:
        $ref: '#/components/requestBodies/api_keys_create'
      parameters:
        - $ref: '#/components/parameters/accept_language'
        - $ref: '#/components/parameters/x_child_company_id'
  /api_keys/{id}:
    get:
      tags:
        - Api Keys
      operationId: getApiKey
      summary: Get Api Key
      description: Gets a api key that corresponds to a api key ID
      responses:
        '200':
          description: successful
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                $ref: '#/components/schemas/api_key_response'
          headers:
            Content-Type:
              description: The format of the response body
              schema:
                type: string
                example: application/json; charset=utf-8
            Conekta-Media-Type:
              schema:
                type: string
                example: conekta-v2.3.0; format=application/json
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/accept_language'
        - $ref: '#/components/parameters/x_child_company_id'
    put:
      tags:
        - Api Keys
      operationId: updateApiKey
      summary: Update Api Key
      description: Update an existing api key
      responses:
        '200':
          description: successful operation
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                $ref: '#/components/schemas/api_key_response'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              title: api_key_update_request
              properties:
                active:
                  type: boolean
                  example: true
                  description: Indicates if the webhook key is active
                description:
                  type: string
                  example: online store
                  description: A name or brief explanation of what this api key is used for
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/accept_language'
    delete:
      tags:
        - Api Keys
      operationId: deleteApiKey
      summary: Delete Api Key
      description: Deletes a api key that corresponds to a api key ID
      responses:
        '200':
          description: successful
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                title: delete_api_keys_response
                allOf:
                  - $ref: '#/components/schemas/api_key_response_on_delete'
                  - type: object
                    properties:
                      deleted:
                        type: boolean
                        example: true
          headers:
            Content-Type:
              description: The format of the response body
              schema:
                type: string
                example: application/json; charset=utf-8
            Conekta-Media-Type:
              schema:
                type: string
                example: conekta-v2.3.0; format=application/json
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/accept_language'
  /balance:
    get:
      tags:
        - Balances
      operationId: getBalance
      summary: Get a company's balance
      description: Get a company's balance
      responses:
        '200':
          description: successful
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                $ref: '#/components/schemas/balance_response'
          headers:
            Date:
              description: The date and time that the response was sent
              schema:
                type: string
                example: Fri, 03 Feb 2023 16:57:48 GMT
            Content-Type:
              description: The format of the response body
              schema:
                type: string
                example: application/json; charset=utf-8
            Content-Length:
              description: The length of the response body in bytes
              schema:
                type: string
                example: '2737'
            Connection:
              description: The type of connection used to transfer the response
              schema:
                type: string
                example: keep-alive
            Conekta-Media-Type:
              schema:
                type: string
                example: conekta-v2.3.0; format=application/json
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/accept_language'
  /charges:
    get:
      tags:
        - Charges
      operationId: getCharges
      summary: Get A List of Charges
      responses:
        '200':
          description: successful
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                title: get_charges_response
                allOf:
                  - $ref: '#/components/schemas/pagination'
                  - $ref: '#/components/schemas/page'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/charge_response'
          headers:
            Date:
              description: The date and time that the response was sent
              schema:
                type: string
                example: Fri, 03 Feb 2023 16:57:48 GMT
            Content-Type:
              description: The format of the response body
              schema:
                type: string
                example: application/json; charset=utf-8
            Content-Length:
              description: The length of the response body in bytes
              schema:
                type: string
                example: '2737'
            Connection:
              description: The type of connection used to transfer the response
              schema:
                type: string
                example: keep-alive
            Conekta-Media-Type:
              schema:
                type: string
                example: conekta-v2.3.0; format=application/json
        '422':
          $ref: '#/components/responses/422_whitelist'
        '500':
          $ref: '#/components/responses/500'
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/accept_language'
        - $ref: '#/components/parameters/x_child_company_id'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/next_page'
        - $ref: '#/components/parameters/previous_page'
  /charges/{id}:
    put:
      tags:
        - Charges
      operationId: updateCharge
      summary: Update a charge
      responses:
        '200':
          description: successful
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                $ref: '#/components/schemas/charge_response'
          headers:
            Date:
              description: The date and time that the response was sent
              schema:
                type: string
                example: Fri, 03 Feb 2023 16:57:48 GMT
            Content-Type:
              description: The format of the response body
              schema:
                type: string
                example: application/json; charset=utf-8
            Content-Length:
              description: The length of the response body in bytes
              schema:
                type: string
                example: '2737'
            Connection:
              description: The type of connection used to transfer the response
              schema:
                type: string
                example: keep-alive
            Conekta-Media-Type:
              schema:
                type: string
                example: conekta-v2.3.0; format=application/json
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422_whitelist'
        '500':
          $ref: '#/components/responses/500'
      security:
        - bearerAuth: []
      requestBody:
        $ref: '#/components/requestBodies/charge_update'
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/accept_language'
        - $ref: '#/components/parameters/x_child_company_id'
  /orders/{id}/charges:
    post:
      tags:
        - Charges
      operationId: ordersCreateCharge
      summary: Create charge
      description: Create charge for an existing orden
      responses:
        '200':
          description: successful
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                $ref: '#/components/schemas/charge_order_response'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '428':
          $ref: '#/components/responses/428'
        '500':
          $ref: '#/components/responses/500'
      security:
        - bearerAuth: []
      requestBody:
        $ref: '#/components/requestBodies/charge_create'
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/accept_language'
        - $ref: '#/components/parameters/x_child_company_id'
  /orders/{id}/add_charges:
    post:
      tags:
        - Charges
      operationId: ordersCreateCharges
      summary: Create charges
      description: Create charges for an existing orden
      responses:
        '200':
          description: successful
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                $ref: '#/components/schemas/charges_order_response'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '428':
          $ref: '#/components/responses/428'
        '500':
          $ref: '#/components/responses/500'
      security:
        - bearerAuth: []
      requestBody:
        $ref: '#/components/requestBodies/charge_create'
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/accept_language'
        - $ref: '#/components/parameters/x_child_company_id'
  /companies:
    get:
      tags:
        - Companies
      operationId: getCompanies
      summary: Get List of Companies
      description: Consume the list of child companies.  This is used for holding companies with several child entities.
      responses:
        '200':
          description: successful
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                title: get_companies_response
                allOf:
                  - $ref: '#/components/schemas/pagination'
                  - $ref: '#/components/schemas/page'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/company_response'
          headers:
            Date:
              description: The date and time that the response was sent
              schema:
                type: string
                example: Fri, 03 Feb 2023 16:57:48 GMT
            Content-Type:
              description: The format of the response body
              schema:
                type: string
                example: application/json; charset=utf-8
            Content-Length:
              description: The length of the response body in bytes
              schema:
                type: string
                example: '2737'
            Connection:
              description: The type of connection used to transfer the response
              schema:
                type: string
                example: keep-alive
            Conekta-Media-Type:
              schema:
                type: string
                example: conekta-v2.3.0; format=application/json
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/accept_language'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/next_page'
        - $ref: '#/components/parameters/previous_page'
    post:
      tags:
        - Companies
      operationId: createCompany
      summary: Create Company
      description: Create a new company.
      requestBody:
        description: Company data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create_company_request'
      responses:
        '201':
          description: Company created successfully
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                $ref: '#/components/schemas/company_response'
          headers:
            Date:
              description: The date and time that the response was sent
              schema:
                type: string
            Content-Type:
              description: The format of the response body
              schema:
                type: string
            Content-Length:
              description: The length of the response body in bytes
              schema:
                type: string
            Connection:
              description: The type of connection used to transfer the response
              schema:
                type: string
            Conekta-Media-Type:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
      security:
        - bearerAuth: []
  /companies/{id}:
    get:
      tags:
        - Companies
      operationId: getCompany
      summary: Get Company
      responses:
        '200':
          description: successful
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                $ref: '#/components/schemas/company_response'
          headers:
            Date:
              description: The date and time that the response was sent
              schema:
                type: string
                example: Fri, 03 Feb 2023 16:57:48 GMT
            Content-Type:
              description: The format of the response body
              schema:
                type: string
                example: application/json; charset=utf-8
            Content-Length:
              description: The length of the response body in bytes
              schema:
                type: string
                example: '2737'
            Connection:
              description: The type of connection used to transfer the response
              schema:
                type: string
                example: keep-alive
            Conekta-Media-Type:
              schema:
                type: string
                example: conekta-v2.3.0; format=application/json
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/accept_language'
  /companies/current:
    get:
      tags:
        - Companies
      operationId: getCurrentCompany
      summary: Get Current Company
      description: Retrieves information about the currently authenticated company. This endpoint returns the same data as the standard company endpoint but automatically uses the current company's context.
      responses:
        '200':
          description: successful
          content:
            application/vnd.conekta-v2.3.0+json:
              schema:
                $ref: '#/components/schemas/company_response'
              example:
                id: 2a1b3c4d5e6f7g8h9i0j1k2l
                name: Mi Empresa S.A. de C.V.
                mcc: '5311'
                active: true
                account_status: activated
                antifraud_vertical: physical_goods
                created_at: 1510699009
                payment_link_enabled: true
                commercial_info:
                  web_page: https://miempresa.mx
                  facebook: ''
                  category: Venta al menudeo
                  average_sale: Range10KPlus
                  monthly_sales: Range0To100K
                  shipping: false
                  physical: false
                  already_selling: true
                  tos_page: https://miempresa.com/terminos
                  website_instructions: ''
                  object: commercial_info
                legal_info:
                  name: MARIA GONZALEZ
                  email: maria.gonzalez@miempresa.com
                  identification_type: ife
                  signed_contract_uploaded: false
                  curp: GOMA930207MSLNZR00
                  object: legal_info
                fiscal_info:
                  tax_id: EMP121008MU7
                  legal_entity_name: Mi Empresa S.A. de C.V.
                  business_type: Persona moral
                  phone: '5563794965'
                  address:
                    street1: AVENIDA INSURGENTES
                    street2: ROMA NORTE
                    street3: Cuauhtémoc
                    city: México
                    state: CIUDAD DE MEXICO
                    country: MEX
