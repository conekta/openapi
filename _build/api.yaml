          items:
            type: string
          example:
            - plan_123
            - plan_456
        expires_at:
          type: integer
          minimum: 1
          format: int64
          description: |
            It is the time when the link will expire. 
            It is expressed in seconds since the Unix epoch. The valid range is from 5 minutes to 365 days from the creation date.
        failure_url:
          type: string
          format: uri
          description: Redirection url back to the site in case of failed payment, applies only to HostedPayment.
          example: https://www.mysite.com/failure
        force_save_card:
          type: boolean
          example: false
          description: Indicates whether the card used for the payment should be saved for future purchases. This field is only applicable for card payments.
        monthly_installments_enabled:
          type: boolean
          example: false
        monthly_installments_options:
          type: array
          items:
            type: integer
            format: int8
          example:
            - 3
            - 6
            - 12
        max_failed_retries:
          type: integer
          format: int8
          description: Number of retries allowed before the checkout is marked as failed
          example: 3
        name:
          type: string
          description: Reason for payment
        on_demand_enabled:
          type: boolean
          example: true
        redirection_time:
          type: integer
          format: int8
          description: number of seconds to wait before redirecting to the success_url
          example: 10
        success_url:
          type: string
          format: uri
          description: Redirection url back to the site in case of successful payment, applies only to HostedPayment
          example: https://www.mysite.com/success
