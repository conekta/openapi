type: object
title: update_product
properties:
  antifraud_info:
    type: object
    additionalProperties:
      type: object
  description:
    type: string
    minLength: 3
    maxLength: 249
  sku:
    type: string
    minLength: 1
    maxLength: 249
  name:
    type: string
    minLength: 3
    maxLength: 249
    example: "Box of Cohiba S1s"
  unit_price: 
    type: integer
    format: int64
    example: 20000
    minimum: 0
  quantity:
    type: integer
    format: int32
    example: 1
    minimum: 1
  tags:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 2
      maxLength: 249
  brand:
    type: string
    minLength: 2
    maxLength: 249
  metadata:
    type: object
    additionalProperties:
      type: string