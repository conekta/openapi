    checkout:
      title: checkout
      description: It is a sub-resource of the Order model that can be stipulated in order to configure its corresponding checkout
      type: object
      required:
        - name
        - type
        - order_template
        - recurrent
        - expires_at
      properties:
        allowed_payment_methods:
          type: array
          items:
            type: string
          example:
            - cash
            - card
            - bank_transfer
            - bnpl
            - pay_by_bank
          description: Those are the payment methods that will be available for the link. This field is mutually exclusive with excluded_payment_methods.
        excluded_payment_methods:
          title: checkout_excluded_payment_methods
          type: array
          description: Payment methods to be excluded from the checkout. This field is mutually exclusive with allowed_payment_methods.
          items:
            type: string
            enum:
              - cash
              - card
              - bank_transfer
              - bnpl
              - pay_by_bank
          example:
            - cash
            - bank_transfer
        exclude_card_networks:
          title: checkout_exclude_card_networks
          type: array
          description: List of card networks to exclude from the checkout. This field is only applicable for card payments.
          items:
            type: string
            enum:
              - visa
              - mastercard
              - amex
          example:
            - visa
            - amex
        expires_at:
          type: integer
          example: 1680397724
          format: int64
          minimum: 1
          description: |
            It is the time when the link will expire. 
            It is expressed in seconds since the Unix epoch. The valid range is from 5 minutes to 365 days from the creation date.
        monthly_installments_enabled:
          type: boolean
          example: true
          description: This flag allows you to specify if months without interest will be active.
        monthly_installments_options:
          description: This field allows you to specify the number of months without interest.
          type: array
          items:
            type: integer
            format: int8
          example:
            - 3
            - 6
            - 12
        three_ds_mode:
          type:
            - string
            - 'null'
          description: Indicates the 3DS2 mode for the order, either smart or strict. This property is only applicable when 3DS is enabled. When 3DS is disabled, this field should be null.
          examples:
            - value: smart
              summary: Those transactions that Conekta considers to present a risk to commerce will go through an additional verification flow (through 3DS2), provided that the issuing bank is compatible with this technology.If the transaction is not considered risky, it will continue its normal course, without going through 3DS2 authentication.
            - value: strict
              summary: All transactions will require 3DS2 authentication as a complementary measure for the security of charges, except those that are rejected by our Anti-Fraud. The issuing bank must be compatible with 3DS2 technology.
        name:
          type: string
          description: Reason for charge
          example: Payment Link Name 1594138857
        needs_shipping_contact:
          type: boolean
          example: false
          description: This flag allows you to fill in the shipping information at checkout.
        on_demand_enabled:
          type:
            - boolean
            - 'null'
          example: true
          description: This flag allows you to specify if the link will be on demand.
        plan_ids:
          description: It is a list of plan IDs that will be associated with the order.
          type: array
          items:
            type: string
          example:
            - plan_123
            - plan_456
        order_template:
          description: It maintains the attributes with which the order will be created when receiving a new payment.
          type: object
          required:
            - currency
            - line_items
          properties:
            currency:
              type: string
              example: MXN
              maxLength: 3
              description: It is the currency in which the order will be created. It must be a valid ISO 4217 currency code.
            customer_info:
              description: It is the information of the customer who will be created when receiving a new payment.
              oneOf:
                - $ref: '#/components/schemas/customer_info'
                - $ref: '#/components/schemas/customer_info_just_customer_id'
            line_items:
              description: They are the products to buy. Each contains the "unit price" and "quantity" parameters that are used to calculate the total amount of the order.
              type: array
              items:
                $ref: '#/components/schemas/product'
            metadata:
              type: object
              additionalProperties: true
              example:
                key: value
              maxProperties: 100
              description: It is a set of key-value pairs that you can attach to the order. It can be used to store additional information about the order in a structured format.
            tax_lines:
              description: List of [taxes](https://developers.conekta.com/v2.3.0/reference/orderscreatetaxes) that are applied to the order.
              type: array
              items:
                $ref: '#/components/schemas/order_tax_request'
            discount_lines:
              description: List of [discounts](https://developers.conekta.com/v2.3.0/reference/orderscreatediscountline) that are applied to the order.
              type: array
              items:
                $ref: '#/components/schemas/order_discount_lines_request'
        payments_limit_count:
          type: integer
          format: int8
          example: 5
          minimum: 1
          description: It is the number of payments that can be made through the link.
        success_url:
          type: string
          example: https://www.conekta.com/success
          description: The URL to redirect to after a successful payment.
        recurrent:
          type: boolean
          example: false
          description: 'false: single use. true: multiple payments'
        type:
          type: string
          example: PaymentLink
          description: It is the type of link that will be created. It must be a valid type.
